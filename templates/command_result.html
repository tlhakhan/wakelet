<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Command Result</title>
  <link rel="stylesheet" href="/static/vendor/bootstrap-5.3.8-dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="/static/vendor/bootstrap-icons-1.13.1/bootstrap-icons.min.css">
  <style>
    pre { margin: 0; white-space: pre-wrap; word-break: break-all; }
  </style>
</head>
<body>
  <div class="container py-4">
    <div class="row justify-content-center">
    <div class="col-12 col-lg-10 col-xl-8">
    <h2 class="mb-4">Command Result</h2>
    <dl class="row mb-0">
      <dt class="col-sm-3">Command</dt>
      <dd class="col-sm-9"><pre>{{ command }}</pre></dd>

      <dt class="col-sm-3">Return code</dt>
      <dd class="col-sm-9 fw-bold {{ 'text-success' if result.returncode == 0 else 'text-danger' }}">
        {{ result.returncode }}
      </dd>

      <dt class="col-sm-3">stdout</dt>
      <dd class="col-sm-9"><pre>{{ result.stdout or "(empty)" }}</pre></dd>

      <dt class="col-sm-3">stderr</dt>
      <dd class="col-sm-9"><pre>{{ result.stderr or "(empty)" }}</pre></dd>
    </dl>

    <a href="/" class="btn btn-secondary mt-4">
      <i class="bi bi-house-fill me-1"></i>Back
    </a>
    </div>
    </div>
  </div>

  <script src="/static/vendor/bootstrap-5.3.8-dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
